<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <!--
      404.html — GitHub Pages SPA redirect trick.
      When GitHub Pages serves a 404, this script saves the current URL
      into sessionStorage and redirects to index.html. The script in
      index.html then restores the original URL via history.replaceState,
      allowing React Router to handle the route client-side.
    -->
    <script>
      sessionStorage.redirect = location.href;
      location.replace(location.origin);
    </script>
  </head>
  <body></body>
</html>
